<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IN VITA • Memoria Viva</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Georgia', serif; overflow: hidden; }
        
        #escenario {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: auto;
            aspect-ratio: 9/16;
            background: url('https://i.imgur.com/8uM1tYg.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding: 20px 0;
            box-sizing: border-box;
        }

        /* Efecto de luz central */
        #escenario::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,215,100,0.2) 0%, rgba(0,0,0,0.8) 80%);
            pointer-events: none;
        }

        .private { font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6; z-index: 1; }
        header { text-align: center; margin: 10px 0; z-index: 1; }
        h1 { font-size: 1.8rem; color: #cfa838; margin: 0; text-shadow: 0 0 10px rgba(207,168,56,0.5); }
        h2 { font-size: 0.9rem; margin: 0; opacity: 0.9; }

        .libros-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 85%;
            z-index: 1;
            margin-top: 10px;
        }

        .book {
            border: 1px solid #cfa838;
            padding: 8px 5px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .book:active { transform: scale(0.95); background: rgba(207,168,56,0.3); }

        footer { margin-top: auto; z-index: 1; font-size: 0.8rem; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div id="escenario">
        <div class="private">IN PRIVATE</div>
        <header>
            <h1>IN VITA</h1>
            <h2>MEMORIA VIVA</h2>
        </header>

        <div class="libros-grid">
            <div class="book" onclick="irA('relatos')">1. RELATOS</div>
            <div class="book" onclick="irA('tranvia')">2. TRANVÍA</div>
            <div class="book" onclick="irA('ecopark')">3. ECOPARK</div>
            <div class="book" onclick="irA('siembra')">4. SIEMBRA</div>
            <div class="book" onclick="irA('bosque')">5. BOSQUE</div>
            <div class="book" onclick="irA('fuente')">6. FUENTE</div>
            <div class="book" onclick="irA('fogón')">7. FOGÓN</div>
            <div class="book" onclick="irA('pesebre')">8. PESEBRE</div>
            <div class="book" onclick="irA('tiempo')">9. TIEMPO</div>
            <div class="book" onclick="irA('ecocomunidad')">10. ECOCOMUNIDAD</div>
            <div class="book" onclick="irA('misiones')">11. MISIONES</div>
            <div class="book" onclick="irA('umbral')">12. UMBRAL</div>
        </div>

        <footer>Bienvenido a Memoria Viva</footer>
    </div>

    <script>
        function irA(destino) {
            alert("Abriendo: " + destino + ".html");
            // window.location.href = destino + ".html"; // Descomenta esto cuando tengas las páginas listas
        }
    </script>
</body>
</html>
